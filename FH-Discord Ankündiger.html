<button onclick="send()">🔥 FINAL HELL Ankündigung senden</button>

<script>
function send() {
    const webhookKey = document.getElementById("webhook").value;
    const category = document.getElementById("category").value;
    const roleKey = document.getElementById("role").value;
    let message = document.getElementById("message").value;

    if (!message) {
        alert("Text fehlt");
        return;
    }

    const presets = {
        news: { title: "📢 SERVER NEWS", color: 5793266 },
        event: { title: "🎉 EVENT ANKÜNDIGUNG", color: 5763719 },
        maintenance: { title: "🛠 WARTUNG", color: 16705372 },
        warning: { title: "⚠️ WICHTIGE WARNUNG", color: 15158332 },
        hardcore: { title: "📜 Regelwerkänderung", color: 10038562 }
    };

    message += `

🔗 **Links**
🌐 Website: ${CONFIG.LINKS.WEBSITE}
💬 Discord: ${CONFIG.LINKS.DISCORD}
🗳 Vote: ${CONFIG.LINKS.VOTE}
📜 Regeln: ${CONFIG.LINKS.RULES}`;

    const payload = {
        content: CONFIG.ROLES[roleKey],
        embeds: [{
            title: presets[category].title,
            description: message,
            color: presets[category].color,
            image: { url: CONFIG.IMAGE },
            footer: { text: CONFIG.FOOTER }
        }]
    };

    fetch(CONFIG.WEBHOOKS[webhookKey].url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(() => alert("Ankündigung gesendet"))
    .catch(() => alert("Fehler beim Senden"));
}
</script>
