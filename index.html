<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Server Control Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0e1015;
    color: #ffffff;
}

header {
    background-color: #151923;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    border-bottom: 1px solid #22283a;
}

nav {
    width: 260px;
    height: 100vh;
    background-color: #131722;
    position: fixed;
    top: 0;
    left: 0;
    padding-top: 80px;
    box-sizing: border-box;
}

nav a {
    display: block;
    padding: 15px 20px;
    color: #cfd3ff;
    text-decoration: none;
    border-left: 4px solid transparent;
}

nav a:hover {
    background-color: #1b2030;
    border-left: 4px solid #5865f2;
}

main {
    margin-left: 260px;
    padding: 40px;
}

.card {
    background-color: #161a26;
    padding: 30px;
    border-radius: 10px;
    max-width: 600px;
}

.card h2 {
    margin-top: 0;
}

.card p {
    color: #b5b9ff;
}
</style>
</head>

<body>

<header>
    Final Hell Management Panel
</header>

<nav>
    <a href="FH-Discord Ankündiger.html">Discord Ankündiger</a>
    <a href="Server Changelogsmaker.html">Server Changelog</a>
    <a href="Discord Changelogsmaker.html">Discord Changelog</a>
    <a href="HomepageChangelogsmaker.html">Homepage Changelog</a>
    <!-- Weitere Tools hier einfügen -->
</nav>

<main>
    <div class="card">
        <h2>Willkommen</h2>
        <p>
            Wähle links ein Tool aus, um Änderungen, Changelogs oder Updates
            für Server, Discord oder Homepage zu erstellen und zu veröffentlichen.
        </p>
    </div>
</main>

</body>
</html>
